<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Invited — Trang & James Vow Ceremony</title>
  <meta name="description" content="Wedding invitation for Trang and James" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Josefin+Sans:wght@200;300;400&display=swap"
    rel="stylesheet"
  />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #4b0404;
      --bg-top: #7a0405;
      --gold: #caa24e;
      --paper: #f4efe4;
      --ink: #302823;
      --muted: #8c837a;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Josefin Sans", sans-serif;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.03), transparent 28%),
        radial-gradient(circle at 82% 30%, rgba(255,255,255,0.025), transparent 26%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-dark) 100%);
      display: grid;
      place-items: center;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: float var(--d) ease-in-out infinite var(--delay);
    }

    @keyframes float {
      0% {
        opacity: 0;
        transform: translateY(0);
      }
      20% {
        opacity: 0.42;
      }
      80% {
        opacity: 0.18;
      }
      100% {
        opacity: 0;
        transform: translateY(-120px);
      }
    }

    .scene {
      position: relative;
      width: min(94vw, 760px);
      height: min(92vh, 900px);
      overflow: hidden;
      z-index: 1;
      user-select: none;
    }

    /* ── PAPER ─────────────────────────────────────────────────────────
       z-index: 8 → sits between envelope-back (z:4) and flap (z:12)
    ──────────────────────────────────────────────────────────────────── */
    .paper-wrap {
      position: absolute;
      left: 50%;
      bottom: 62px; /* same baseline as envelope */
      width: min(52vw, 380px);
      transform: translateX(-50%) translateY(260px);
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      transition:
        transform 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.12s,
        opacity   0.38s ease                            0.12s,
        filter    0.38s ease;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0));
    }

    .scene.opened .paper-wrap {
      /* slide up so paper peeks out above the envelope body */
      transform: translateX(-50%) translateY(-160px);
      opacity: 1;
      filter: drop-shadow(0 18px 28px rgba(58,32,22,0.15));
    }

    .paper {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52), rgba(255,255,255,0) 18%),
        linear-gradient(180deg, #f7f2e8 0%, var(--paper) 100%);
      color: var(--ink);
      text-align: center;
      padding: 38px 30px 36px;
      box-shadow:
        0 14px 40px rgba(85,50,35,0.08),
        inset 0 0 0 1px rgba(120,95,72,0.05);
      overflow: hidden;
      border-radius: 2px 2px 0 0;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(126,102,81,0.10) 0.6px, transparent 0.8px),
        radial-gradient(rgba(255,255,255,0.18) 0.5px, transparent 0.75px);
      background-size: 12px 12px, 15px 15px;
      background-position: 0 0, 3px 4px;
      opacity: 0.5;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .paper::after {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 16px;
      background:
        radial-gradient(circle at 6px 18px, transparent 10px, rgba(0,0,0,0.03) 10.5px, rgba(0,0,0,0.015) 11px, transparent 12px) repeat-x;
      background-size: 26px 18px;
      opacity: 0.3;
      pointer-events: none;
    }

    .paper-eyebrow {
      display: block;
      margin-bottom: 20px;
      font-size: 0.48rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .paper-secret {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 1.06rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .paper-secret-vi {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .paper-rule,
    .paper-rule-sm {
      height: 1px;
      background: var(--gold);
      margin-left: auto;
      margin-right: auto;
      opacity: 0.42;
    }

    .paper-rule {
      width: 24px;
      margin-bottom: 16px;
    }

    .paper-rule-sm {
      width: 16px;
      margin-top: 14px;
      margin-bottom: 12px;
      opacity: 0.32;
    }

    .paper-names {
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: 1.42rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .paper-and {
      display: block;
      margin: 2px 0;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.82rem;
      color: var(--gold);
      letter-spacing: 0.2em;
    }

    .paper-detail {
      font-size: 0.54rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.95;
    }

    .paper-detail strong {
      color: var(--ink);
      font-weight: 400;
    }

    .paper-note {
      margin-top: 18px;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.76rem;
      color: var(--gold);
      opacity: 0.82;
    }

    /* ── ENVELOPE LAYERS ───────────────────────────────────────────────
       Three layers create the "paper tucked inside" illusion:

       z:4   .env-back   — open envelope body, BEHIND paper
       z:8   .paper-wrap — invitation card, between layers
       z:12  .env-front  — open envelope flap only (clipped), IN FRONT of paper
       z:15  .env-closed — closed envelope, fades out on open
    ──────────────────────────────────────────────────────────────────── */

    /* Shared positioning for all envelope layers */
    .envelope-layer {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: min(92vw, 660px);
      aspect-ratio: 1536 / 1147;
      transform: translateX(-50%);
    }

    .envelope-layer img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* LAYER 1 — flap triangle only (BEHIND paper, clipped to top ~50%) */
    .env-back {
      z-index: 4;
      pointer-events: none;
      clip-path: inset(0 0 52% 0); /* top half only = the open flap triangle */
    }

    .env-back img {
      opacity: 0;
      mix-blend-mode: multiply; /* makes black background transparent */
      transition: opacity 0.5s ease 0.1s;
    }

    .scene.opened .env-back img {
      opacity: 1;
    }

    /* LAYER 2 — envelope body/rectangle (IN FRONT of paper, clipped to bottom ~52%) */
    .env-front {
      z-index: 12;
      pointer-events: none;
      clip-path: inset(48% 0 0 0); /* bottom half only = the rectangular body */
    }

    .env-front img {
      opacity: 0;
      mix-blend-mode: multiply; /* makes black background transparent */
      transition: opacity 0.5s ease 0.1s;
    }

    .scene.opened .env-front img {
      opacity: 1;
    }

    /* LAYER 3 — closed envelope (fades out on open) */
    .env-closed {
      z-index: 15;
      cursor: pointer;
    }

    .env-closed img {
      filter: drop-shadow(0 24px 34px rgba(0,0,0,0.24));
      transition:
        opacity   0.45s ease,
        transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .scene.opened .env-closed {
      pointer-events: none;
    }

    .scene.opened .env-closed img {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }

    /* Invisible click target that covers the open envelope */
    .env-open-click {
      z-index: 13;
      cursor: pointer;
      opacity: 0;
    }

    /* ── HINT ──────────────────────────────────────────────────────── */
    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(202,162,78,0.62);
      animation: pulse 2.4s ease-in-out infinite;
      white-space: nowrap;
      text-align: center;
      z-index: 20;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }

    /* ── RESPONSIVE ────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .scene {
        width: 96vw;
        height: 88vh;
      }

      .paper-wrap {
        width: min(58vw, 260px);
        bottom: 140px;
      }

      .paper {
        padding: 28px 18px 28px;
      }

      .paper-secret    { font-size: 0.92rem; }
      .paper-secret-vi { font-size: 0.72rem; }
      .paper-names     { font-size: 1.18rem; }
      .paper-detail    { font-size: 0.48rem; }
      .paper-note      { font-size: 0.72rem; }

      .envelope-layer {
        width: min(98vw, 520px);
        bottom: 50px;
      }

      .hint { font-size: 0.5rem; letter-spacing: 0.24em; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="scene" id="scene">

    <!-- Invitation paper — z-index 8, sandwiched between envelope layers -->
    <div class="paper-wrap">
      <div class="paper">
        <span class="paper-eyebrow">Lời mời đặc biệt<br/>A secret invitation</span>

        <p class="paper-secret">
          You have been chosen<br />
          to witness our vows.
        </p>

        <p class="paper-secret-vi">
          Bạn đã được chọn để<br />
          chứng kiến lời thề của chúng tôi.
        </p>

        <div class="paper-rule"></div>

        <div class="paper-names">
          Trang Pham
          <span class="paper-and">&amp;</span>
          James Tran
        </div>

        <div class="paper-rule-sm"></div>

        <div class="paper-detail">
          <strong>Sunday · Chủ Nhật</strong><br />
          18 October 2026<br /><br />
          <strong>16:00</strong><br />
          Hotel Nikko Saigon<br />
          District 1, Ho Chi Minh City
        </div>

        <p class="paper-note">— just between us 🤫 —</p>
      </div>
    </div>

    <!-- Layer 1: open envelope body (z:4, behind paper) -->
    <div class="envelope-layer env-back">
      <img src="./envelope open blank.png" alt="" />
    </div>

    <!-- Layer 2: open envelope flap clipped (z:12, in front of paper) -->
    <div class="envelope-layer env-front">
      <img src="./envelope open blank.png" alt="" />
    </div>

    <!-- Layer 3: closed envelope (z:15, fades out when opened) -->
    <div class="envelope-layer env-closed" onclick="toggleEnvelope()">
      <img src="./envelope close.png" alt="Click to open invitation" />
    </div>

    <!-- Invisible click target over open envelope -->
    <div class="envelope-layer env-open-click" onclick="toggleEnvelope()"></div>

    <p class="hint" id="hint">Nhấn để mở · Click to open</p>
  </div>

  <script>
    /* Floating particles */
    const container = document.getElementById("particles");
    for (let i = 0; i < 28; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      const size = 1.5 + Math.random() * 1.5;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top:  ${20 + Math.random() * 72}%;
        width:  ${size}px;
        height: ${size}px;
      `;
      p.style.setProperty("--d",     5 + Math.random() * 5 + "s");
      p.style.setProperty("--delay", -Math.random() * 8 + "s");
      container.appendChild(p);
    }

    /* Envelope toggle */
    const scene = document.getElementById("scene");
    const hint  = document.getElementById("hint");
    let opened = false, animating = false;

    function toggleEnvelope() {
      if (animating) return;
      animating = true;
      opened = !opened;
      scene.classList.toggle("opened", opened);
      hint.textContent = opened
        ? "Nhấn để đóng · Click to close"
        : "Nhấn để mở · Click to open";
      setTimeout(() => animating = false, 1100);
    }
  </script>
</body>
</html>
