<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Invited — Trang & James Vow Ceremony</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #4b0404;
      --gold: #caa24e;
      --card: #f7f3ee;
      --ink: #201b19;
      --muted: #7c756e;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Josefin Sans', sans-serif;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.03), transparent 28%),
        radial-gradient(circle at 82% 30%, rgba(255,255,255,0.025), transparent 26%),
        linear-gradient(180deg, #6a0303 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: float var(--d) ease-in-out infinite var(--delay);
    }

    @keyframes float {
      0% { opacity: 0; transform: translateY(0); }
      20% { opacity: 0.42; }
      80% { opacity: 0.18; }
      100% { opacity: 0; transform: translateY(-120px); }
    }

    .scene {
      position: relative;
      width: min(94vw, 760px);
      height: min(92vh, 860px);
      overflow: hidden;
      z-index: 1;
    }

    .card-outer {
      position: absolute;
      left: 50%;
      top: 56px;
      width: min(62vw, 420px);
      transform: translateX(-50%) translateY(320px);
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      transition:
        transform 0.95s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.35s ease,
        filter 0.35s ease;
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0));
    }

    .scene.opened .card-outer {
      transform: translateX(-50%) translateY(26px);
      opacity: 1;
      z-index: 8;
      filter: drop-shadow(0 24px 56px rgba(0,0,0,0.18));
      transition-delay: 0.2s;
    }

    .card {
      position: relative;
      background: var(--card);
      color: var(--ink);
      text-align: center;
      padding: 50px 38px 36px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 18%),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.18), transparent 20%);
      pointer-events: none;
    }

    .card-eyebrow {
      display: block;
      margin-bottom: 22px;
      font-size: 0.54rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .card-secret {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .card-secret-vi {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 26px;
    }

    .card-rule,
    .card-rule-sm {
      height: 1px;
      background: var(--gold);
      margin-left: auto;
      margin-right: auto;
      opacity: 0.45;
    }

    .card-rule { width: 32px; margin-bottom: 22px; }
    .card-rule-sm { width: 20px; margin-top: 20px; margin-bottom: 16px; opacity: 0.35; }

    .card-names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.15rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .card-and {
      display: block;
      margin: 4px 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.2em;
    }

    .card-detail {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 2.15;
    }

    .card-detail strong {
      color: var(--ink);
      font-weight: 400;
    }

    .card-shhh {
      margin-top: 24px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--gold);
      opacity: 0.82;
    }

    .envelope-stage {
      position: absolute;
      left: 50%;
      bottom: 84px;
      width: min(78vw, 520px);
      aspect-ratio: 1536 / 1147;
      transform: translateX(-50%);
      z-index: 10;
      cursor: pointer;
    }

    .envelope-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transition:
        opacity 0.45s ease,
        transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
        filter 0.45s ease;
      filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.24));
    }

    .envelope-closed {
      opacity: 1;
      transform: translateY(0) scale(1);
      z-index: 12;
    }

    .scene.opened .envelope-closed {
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      pointer-events: none;
    }

    .envelope-open {
      opacity: 0;
      transform: translateY(12px) scale(0.99);
      z-index: 6;
    }

    .scene.opened .envelope-open {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(202, 162, 78, 0.62);
      animation: pulse 2.4s ease-in-out infinite;
      transition: opacity 0.25s ease;
      white-space: nowrap;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @media (max-width: 700px) {
      .scene {
        width: 96vw;
        height: 88vh;
      }

      .card-outer {
        width: min(72vw, 340px);
        top: 52px;
        transform: translateX(-50%) translateY(290px);
      }

      .scene.opened .card-outer {
        transform: translateX(-50%) translateY(18px);
      }

      .card {
        padding: 40px 26px 30px;
      }

      .card-secret {
        font-size: 1.12rem;
      }

      .card-secret-vi {
        font-size: 0.82rem;
      }

      .card-names {
        font-size: 1.55rem;
      }

      .card-detail {
        font-size: 0.58rem;
      }

      .card-shhh {
        font-size: 0.82rem;
      }

      .envelope-stage {
        width: min(88vw, 420px);
        bottom: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="scene" id="scene">
    <div class="card-outer" id="cardOuter">
      <div class="card">
        <span class="card-eyebrow">Lời mời đặc biệt · A secret invitation</span>
        <p class="card-secret">You have been chosen<br />to witness our vows.</p>
        <p class="card-secret-vi">Bạn đã được chọn để<br />chứng kiến lời thề của chúng tôi.</p>
        <div class="card-rule"></div>
        <div class="card-names">Trang Pham<span class="card-and">&amp;</span>James Tran</div>
        <div class="card-rule-sm"></div>
        <div class="card-detail">
          <strong>Sunday · Chủ Nhật</strong><br />
          18 October 2026<br /><br />
          <strong>16:00</strong><br />
          Hotel Nikko Saigon<br />
          District 1, Ho Chi Minh City
        </div>
        <p class="card-shhh">— just between us 🤫 —</p>
      </div>
    </div>

    </div>

    <p class="hint" id="hint">Nhấn để mở · Click to open</p>
  </div>

  <script>
    const particlesContainer = document.getElementById('particles');
    const scene = document.getElementById('scene');
    const hint = document.getElementById('hint');
    let opened = false;
    let animating = false;

    for (let i = 0; i < 28; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = 20 + Math.random() * 75 + '%';
      particle.style.setProperty('--d', 5 + Math.random() * 5 + 's');
      particle.style.setProperty('--delay', -Math.random() * 8 + 's');
      particlesContainer.appendChild(particle);
    }

    function toggleEnvelope() {
      if (animating) return;
      animating = true;
      opened = !opened;
      scene.classList.toggle('opened', opened);
      hint.textContent = opened ? 'Nhấn để đóng · Click to close' : 'Nhấn để mở · Click to open';
      setTimeout(() => {
        animating = false;
      }, 1100);
    }
  </script>
</body>
</html>
